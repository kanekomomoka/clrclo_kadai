<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>React入門</title>
</head>
<body>
  <div id="app"></div>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-type="module">
    import React from "https://esm.sh/react@19.1.0/?dev";
    import ReactDOMClient from "https://esm.sh/react-dom@19.1.0/client/?dev";

    // ここにReactのコードを書いていきます
    const domNode = document.getElementById('app');
    const root = ReactDOMClient.createRoot(domNode);

    function ShowProfileInfo({ users }) {
      return (
        <div>
          { users.map(user => (
            <div key={ user.id }>
              <p>名前: { user.name }</p>
              <p>年齢: { user.age }歳</p>
              <p>お酒が{ user.age < 20 ? "飲めません" : "飲めます"}</p>
            </div>
          ))}
        </div>
      );
    }

    function App() {
      const users = [
        { id: 1, name: "山田太郎", age: 15 },
        { id: 2, name: "佐藤花子", age: 34 },
        { id: 3, name: "田中一郎", age: 22 }
      ];
      return (
        <div>
          <ShowProfileInfo users={users} />
        </div>
      );
    }
    root.render(<App />);
  </script>
</body>
</html>

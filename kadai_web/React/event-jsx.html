<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
  <body>
  <div id="app"></div>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" data-type="module">
  import React from "https://esm.sh/react@19.1.0/?dev"; 
  import ReactDOMClient from "https://esm.sh/react-dom@19.1.0/client/?dev";

  const domNode = document.getElementById('app');
  const root = ReactDOMClient.createRoot(domNode);

  function handleChange(event){
    console.log('入力された値:', event.target.value);//eventオブジェクトのtargetプロパティから入力された値を取得し、コンソールに表示
  };

  const element = (
    <div>
      <input 
        type="text"
        onChange={handleChange}//onChangeイベントにhandleChange関数を設定
        placeholder="テキストを入力"
        />
    </div>
  );
  root.render(element);
  </script>
</body>
</html>

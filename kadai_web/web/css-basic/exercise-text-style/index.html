<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>テキスト装飾の練習</title>
</head>
<style>
  h1{
    text-align: center;
    color: olive;
  }
  p{
    text-align: center;
  }
  p span{
    font-size: 1.5em;
    font-weight: bold;
    text-decoration: underline;
  }
</style>
<body>
  <h1>テキスト装飾の練習</h1>
  <p>さまざまなプロパティを使って、<span>テキスト装飾</span>をしてみましょう。</p>
</body>
</html>
